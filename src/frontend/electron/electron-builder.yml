appId: com.platform.desktop
productName: PlatformDesktop
directories:
  output: "../../../artifacts/installer"
files:
  - dist/**/*
  - dist-electron/**/*
extraResources:
  - from: "../../../artifacts/backend"
    to: "backend"
    filter:
      - "**/*"
win:
  target: nsis
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
